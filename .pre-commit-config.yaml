minimum_pre_commit_version: "3.6.0"
default_stages: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json

  - repo: local
    hooks:
      - id: lint
        name: lint (pre-commit)
        entry: npm run lint
        language: system
        pass_filenames: false

      - id: typecheck
        name: typecheck (pre-commit)
        entry: npm run typecheck
        language: system
        pass_filenames: false

      - id: test-related
        name: test related staged files (pre-commit)
        entry: >-
          bash -lc '
          related_files=();
          for file in "$@"; do
            case "$file" in
              *.js|*.jsx|*.ts|*.tsx)
                related_files+=("$file")
                ;;
            esac
          done;

          if [ ${#related_files[@]} -eq 0 ]; then
            echo "No JS/TS staged files; skipping Jest related tests.";
            exit 0;
          fi;

          npm run test -- --bail --findRelatedTests --passWithNoTests "${related_files[@]}"'
        language: system
        pass_filenames: true
